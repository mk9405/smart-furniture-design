<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 40px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: white;
            color: #0077ff;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0077ff;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>

        <button onclick="goToHome()">
            Go To Home
        </button>
    </div>

    <script>
        function goToHome() {
            window.location.href = "./aurelian_home_of_luxury/code.html";
        }
    </script>

</body>
</html>
