<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width,initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffffff, 1.2);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// High-end minimalist Lounge Chair geometry
const chairGroup = new THREE.Group();

// Seat
const seatGeom = new THREE.BoxGeometry(2, 0.4, 1.8);
const leatherMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a, shininess: 30 });
const seat = new THREE.Mesh(seatGeom, leatherMat);
chairGroup.add(seat);

// Backrest
const backGeom = new THREE.BoxGeometry(0.3, 1.8, 1.8);
const backrest = new THREE.Mesh(backGeom, leatherMat);
backrest.position.set(-1, 0.8, 0);
backrest.rotation.z = -0.1;
chairGroup.add(backrest);

// Gold/Brass Legs
const legGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.8);
const goldMat = new THREE.MeshPhongMaterial({ color: 0xd4af37, shininess: 100 });
const legPositions = [[0.8, -0.4, 0.7], [0.8, -0.4, -0.7], [-0.8, -0.4, 0.7], [-0.8, -0.4, -0.7]];
legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeom, goldMat);
    leg.position.set(pos[0], pos[1], pos[2]);
    chairGroup.add(leg);
});

scene.add(chairGroup);
camera.position.z = 6;
camera.position.y = 1;

// Animation
function animate() {
    requestAnimationFrame(animate);
    chairGroup.rotation.y += 0.005;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->


</body></html>
